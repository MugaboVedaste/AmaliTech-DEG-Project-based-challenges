<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Pulse-Check Dashboard{% endblock %}</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      header h1 {
        font-size: 28px;
      }

      .nav-links {
        display: flex;
        gap: 20px;
      }

      .nav-links a {
        color: white;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 5px;
        transition: background 0.3s;
      }

      .nav-links a:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .alert-link {
        position: relative;
      }

      .notification-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 22px;
        height: 22px;
        margin-left: 8px;
        padding: 0 7px;
        border-radius: 999px;
        background: #f44336;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }

      .content {
        padding: 40px;
      }

      .messages {
        display: grid;
        gap: 12px;
        margin-bottom: 24px;
      }

      .message {
        border-radius: 8px;
        padding: 12px 16px;
        font-weight: 600;
      }

      .message-success {
        background: #eaf7ee;
        color: #1f7a3f;
        border: 1px solid #bce4c9;
      }

      .message-error {
        background: #fdecec;
        color: #a61d24;
        border: 1px solid #f2b8b5;
      }

      .message-info {
        background: #eaf2ff;
        color: #2457a6;
        border: 1px solid #c6d7ff;
      }

      .panel {
        background: #f9f9f9;
        border: 1px solid #e6e6e6;
        border-radius: 10px;
        padding: 24px;
        margin-bottom: 28px;
      }

      .panel h3 {
        margin-bottom: 16px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }

      .form-field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .form-field label {
        color: #555;
        font-weight: 600;
      }

      .form-field input {
        padding: 12px 14px;
        border: 1px solid #d6d6d6;
        border-radius: 6px;
        font-size: 14px;
        width: 100%;
      }

      .form-actions {
        margin-top: 18px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .inline-form {
        display: inline;
      }

      .inline-form button {
        flex: none;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .stat-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      }

      .stat-card h3 {
        font-size: 14px;
        margin-bottom: 10px;
        opacity: 0.9;
      }

      .stat-card .value {
        font-size: 32px;
        font-weight: bold;
      }

      .monitor-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
      }

      .monitor-card {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 20px;
        transition: all 0.3s;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .monitor-card:hover {
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        transform: translateY(-4px);
      }

      .monitor-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .device-id {
        font-size: 18px;
        font-weight: bold;
        color: #333;
      }

      .status-badge {
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
      }

      .status-active {
        background: #4caf50;
        color: white;
      }

      .status-paused {
        background: #ff9800;
        color: white;
      }

      .status-down {
        background: #f44336;
        color: white;
      }

      .monitor-info {
        background: #f5f5f5;
        padding: 12px;
        border-radius: 5px;
        margin-bottom: 15px;
        font-size: 14px;
      }

      .monitor-info div {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .monitor-info div:last-child {
        margin-bottom: 0;
      }

      .monitor-info label {
        color: #666;
        font-weight: 500;
      }

      .monitor-info value {
        color: #333;
        font-weight: bold;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s;
      }

      .btn-primary {
        background: #667eea;
        color: white;
      }

      .btn-primary:hover {
        background: #5568d3;
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      .btn-secondary {
        background: #f0f0f0;
        color: #333;
      }

      .btn-secondary:hover {
        background: #e0e0e0;
      }

      .btn-small {
        padding: 6px 12px;
        font-size: 12px;
        flex: auto;
      }

      .btn-danger {
        background: #f44336;
        color: white;
      }

      .btn-danger:hover {
        background: #da190b;
      }

      .btn-success {
        background: #4caf50;
        color: white;
      }

      .btn-success:hover {
        background: #3f8f43;
      }

      .alert-table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
      }

      .alert-table th {
        background: #f5f5f5;
        padding: 12px;
        text-align: left;
        border-bottom: 2px solid #e0e0e0;
        font-weight: 600;
        color: #333;
      }

      .alert-table td {
        padding: 12px;
        border-bottom: 1px solid #e0e0e0;
      }

      .alert-table tr:hover {
        background: #f9f9f9;
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: #999;
      }

      .empty-state svg {
        width: 100px;
        height: 100px;
        margin-bottom: 20px;
        opacity: 0.3;
      }

      footer {
        background: #f5f5f5;
        padding: 20px;
        text-align: center;
        color: #999;
        border-top: 1px solid #e0e0e0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>💓 Pulse-Check</h1>
        <div class="nav-links">
          <a href="{% url 'dashboard' %}">Dashboard</a>
          <a href="{% url 'monitor_list' %}">Monitors</a>
          <a class="alert-link" href="{% url 'alert_history' %}">
            Alerts
            {% if unread_alert_count %}
            <span class="notification-badge">{{ unread_alert_count }}</span>
            {% endif %}
          </a>
          <a href="{% url 'logout' %}">Logout</a>
        </div>
      </header>

      {% if messages %}
      <div class="messages">
        {% for message in messages %}
        <div class="message message-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      <div class="content">{% block content %}{% endblock %}</div>

      <footer>
        <p>&copy; 2026 Pulse-Check - Device Health Monitoring System</p>
      </footer>
    </div>
  </body>
</html>
