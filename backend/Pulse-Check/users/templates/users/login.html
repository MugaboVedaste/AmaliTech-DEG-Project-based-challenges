<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Pulse-Check</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      }

      h1 {
        margin-bottom: 10px;
        color: #1f2937;
      }

      p {
        color: #6b7280;
        margin-bottom: 24px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #374151;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        margin-bottom: 18px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 15px;
      }

      button {
        width: 100%;
        padding: 12px 14px;
        border: 0;
        border-radius: 10px;
        background: #667eea;
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #5568d3;
      }

      .error {
        background: #fee2e2;
        color: #991b1b;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 16px;
      }

      .hint {
        margin-top: 16px;
        text-align: center;
        font-size: 14px;
        color: #6b7280;
      }

      .hint a {
        color: #667eea;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Pulse-Check Login</h1>
      <p>Sign in to view your monitor dashboard.</p>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />

        <button type="submit">Login</button>
      </form>

      <div class="hint">
        Use your registered user account, not the admin login.
      </div>
    </div>
  </body>
</html>
